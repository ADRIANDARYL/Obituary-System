<!DOCTYPE html>
<html>
<head>
    <title>Login - DOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .system-title {
            color: #2c7be5;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .dove-icon {
            display: block;
            margin: 0 auto 20px auto;
            width: 80px;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card shadow" style="width: 380px;">
    <div class="card-body">
        <img src="{{ url_for('static', filename='images/dove.png') }}" class="dove-icon" alt="Dove">
        
        <h4 class="system-title">Digital Obituary Management System</h4>
        <h5 class="text-center mb-4">Login</h5>
        
        <!-- FLASH MESSAGES - FIX ADDED -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'message' else 'danger' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/login">
            <input name="username" class="form-control mb-2" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <button class="btn btn-primary w-100">Login</button>
        </form>
        
        <hr>
        <p class="text-center mb-0">Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
