{% extends "base.html" %}

{% block content %}

<h2>Records</h2>

<table class="table table-striped table-hover shadow">
    <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>DOB</th>
            <th>DOD</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for r in records %}
        <tr>
            <td>{{ r.full_name }}</td>
            <td>{{ r.date_of_birth }}</td>
            <td>{{ r.date_of_death }}</td>
            <td>
                <a href="/view/{{r.id}}" class="btn btn-sm btn-info">View</a>
                <a href="/edit/{{r.id}}" class="btn btn-sm btn-primary">Edit</a>
                <a href="/delete/{{r.id}}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this record?')">Delete</a>
                <a href="/pdf/{{r.id}}" class="btn btn-sm btn-success">PDF</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/add" class="btn btn-success">Add New Record</a>

{% endblock %}
